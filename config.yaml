log:
  level: "error"   # debug, info, warn, error
web:
  listen: ":8080"           # Web 管理界面端口
db:
  path: "./dsdns.db"       # SQLite 数据库文件
geo:
  ip2region_v4: "./ip2region_v4.xdb"
  ip2region_v6: "./ip2region_v6.xdb"
jwt:
  secret: "change-me-to-a-random-string"   # 生产环境务必修改
  expire_hours: 24
cache:
  geo_ttl_sec: 600          # IP 地理结果内存缓存时间（秒）

# 新增 DoH 与伪装配置
doh:
  domain: "example.com"        # 你管理的域名
  managed: true                # 是否自动管理证书（Let's Encrypt）
  listen_http: ":80"           # HTTP 重定向端口（用于自动证书验证）
  listen_https: ":443"         # HTTPS 服务端口
  cache_dir: "./certs"         # 证书缓存目录
  welcome_page: "./welcome.html" # 可自定义欢迎页内容，若不提供则使用内置默认页
